<script>
// ── Timezone-based automatic dark / light mode ──────────────────
(function () {
  function isDaytime() {
    try {
      const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
      const now = new Date();
      const formatter = new Intl.DateTimeFormat('en-US', {
        timeZone: tz, hour: 'numeric', hour12: false
      });
      const hour = parseInt(formatter.format(now), 10);
      return hour >= 6 && hour < 20; // light 06:00–20:00
    } catch (e) { return true; }
  }

  const stored = localStorage.getItem('quarto-color-scheme');
  if (!stored) {
    // Only auto-set if user has never manually toggled
    const scheme = isDaytime() ? 'default' : 'dark';
    document.documentElement.setAttribute('data-bs-theme', scheme === 'dark' ? 'dark' : 'light');
    localStorage.setItem('quarto-color-scheme', scheme);
  }
})();
</script>
