site_name: Mahmoodur Rahman
site_url: https://mahm00d27.github.io

theme:
  name: material

  features:
    - navigation.tabs
    - navigation.instant
    - navigation.top
    - navigation.sections
    - content.code.copy
    - content.action.edit

  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: teal

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: teal

nav:
  - Home: index.md
  - About: about.md
  - Experience: experience.md
  - Projects: projects.md
  - Publications: publications.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - codehilite

plugins:
  - search
