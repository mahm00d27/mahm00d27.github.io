name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only deploy after tests pass
# Tests run in tests.yml on every push — this workflow checks that result.
permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── BUILD ──────────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R 4.4
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4.0"
          use-public-rspm: true

      - name: Install system dependencies
        run: sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Install renv
        run: |
          options(repos = c(CRAN = "https://cloud.r-project.org"))
          install.packages("renv")
        shell: Rscript {0}

      - name: Restore renv packages
        uses: r-lib/actions/setup-renv@v2
        with:
          cache-version: 2

      - name: Run tests before build
        run: |
          options(
            repos    = c(CRAN = "https://cloud.r-project.org"),
            box.path = getwd()
          )
          results <- testthat::test_dir(
            "tests/testthat",
            reporter = testthat::ProgressReporter$new(max_failures = Inf)
          )
          if (any(as.data.frame(results)$failed > 0)) quit(status = 1)
        shell: Rscript {0}

      - name: Setup Quarto 1.5
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "1.5.57"

      - name: Render site
        run: |
          Rscript -e "options(box.path = getwd())"
          quarto render

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  # ── DEPLOY ─────────────────────────────────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
