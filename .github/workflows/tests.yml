name: Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      RENV_PATHS_ROOT: ~/.cache/R/renv
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4.1"
          use-public-rspm: true
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev
      - name: Cache renv packages
        uses: actions/cache@v4
        with:
          path: ${{ env.RENV_PATHS_ROOT }}
          key: ${{ runner.os }}-renv-${{ hashFiles('**/renv.lock') }}
          restore-keys: |
            ${{ runner.os }}-renv-
      - name: Install and restore renv
        shell: Rscript {0}
        run: |
          options(repos = c(CRAN = "https://cloud.r-project.org"))
          if (!requireNamespace("renv", quietly = TRUE)) install.packages("renv")
          renv::restore(clean = TRUE, prompt = FALSE)
      - name: Diagnostics
        shell: Rscript {0}
        run: |
          cat(">>> renv::status():\n")
          renv::status()
          cat("\n>>> sessionInfo():\n")
          print(sessionInfo())
          cat("\n>>> testthat installed?\n")
          cat(requireNamespace("testthat", quietly = TRUE), "\n")
      - name: Run tests
        shell: Rscript {0}
        run: |
          if (file.exists("renv/activate.R")) source("renv/activate.R", local = TRUE)
          options(
            repos    = c(CRAN = "https://cloud.r-project.org"),
            box.path = getwd()
          )
          pkgs <- c("testthat", "box", "here")
          miss <- pkgs[!vapply(pkgs, requireNamespace, logical(1), quietly = TRUE)]
          if (length(miss)) {
            message("Installing missing packages: ", paste(miss, collapse = ", "))
            install.packages(miss)
          }
          results <- testthat::test_dir(
            "tests/testthat",
            reporter = testthat::ProgressReporter$new(max_failures = Inf)
          )
          df <- as.data.frame(results)
          if (nrow(df) && any(df$failed > 0)) {
            cat("\n--- FAILED TESTS ---\n")
            print(results)
            quit(status = 1)
          }