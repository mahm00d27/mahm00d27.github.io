name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R 4.4
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4.0"
          use-public-rspm: true

      - name: Install system dependencies
        run: sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Install renv
        run: |
          options(repos = c(CRAN = "https://cloud.r-project.org"))
          install.packages("renv")
        shell: Rscript {0}

      - name: Restore renv packages
        uses: r-lib/actions/setup-renv@v2
        with:
          cache-version: 2

      - name: Run tests
        run: |
          options(
            repos     = c(CRAN = "https://cloud.r-project.org"),
            box.path  = getwd()
          )
          results <- testthat::test_dir(
            "tests/testthat",
            reporter = testthat::ProgressReporter$new(max_failures = Inf)
          )
          if (any(as.data.frame(results)$failed > 0)) {
            cat("\n--- FAILED TESTS ---\n")
            print(results)
            quit(status = 1)
          }
        shell: Rscript {0}
